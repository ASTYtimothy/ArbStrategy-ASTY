    :root {
      --bg1: #07111f;
      --bg2: #0b1830;
      --panel: rgba(10, 18, 34, 0.82);
      --border: rgba(133, 87, 255, 0.22);
      --text: #e9efff;
      --muted: #9fb2d9;
      --purple: #8b5cf6;
      --purple-2: #a855f7;
      --cyan: #22d3ee;
      --red: #ff5d73;
      --shadow: 0 0 30px rgba(139, 92, 246, 0.18);
      --radius: 22px;
      --transition: 0.28s ease;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(34, 211, 238, 0.08), transparent 22%),
        radial-gradient(circle at 80% 30%, rgba(168, 85, 247, 0.11), transparent 26%),
        radial-gradient(circle at 50% 80%, rgba(139, 92, 246, 0.08), transparent 28%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
      opacity: 0.35;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px 14px;
    }

    .card {
      width: 100%;
      max-width: 920px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 22px 22px 20px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(139, 92, 246, 0.10), transparent 35%),
        linear-gradient(315deg, rgba(34, 211, 238, 0.06), transparent 30%);
    }

    .wolf-top {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 10px;
      min-height: 110px;
    }

    .wolf-glow {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(139, 92, 246, 0.28) 0%, rgba(34, 211, 238, 0.15) 38%, rgba(139, 92, 246, 0.02) 68%, transparent 76%);
      filter: blur(16px);
      animation: wolfGlow 2.6s ease-in-out infinite;
      pointer-events: none;
    }

    .wolf {
      position: relative;
      width: 110px;
      max-width: 30vw;
      height: auto;
      object-fit: contain;
      filter:
        drop-shadow(0 0 16px rgba(139, 92, 246, 0.32))
        drop-shadow(0 0 28px rgba(34, 211, 238, 0.14));
      animation: wolfPulse 2.6s ease-in-out infinite;
      user-select: none;
      -webkit-user-drag: none;
    }

    .header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--cyan);
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--cyan);
      box-shadow: 0 0 12px rgba(34, 211, 238, 0.75);
      animation: pulseDot 1.8s infinite;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 4.6vw, 48px);
      line-height: 1.04;
      letter-spacing: 0.03em;
      font-weight: 800;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(139, 92, 246, 0.22);
    }

    .sub {
      margin: 10px auto 0;
      max-width: 700px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .output-box {
      position: relative;
      z-index: 1;
      min-height: 175px;
      border-radius: 20px;
      padding: 22px 20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015)),
        rgba(4, 10, 22, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 24px rgba(0,0,0,0.18);
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition), opacity var(--transition);
    }

    .output-box.win {
      border-color: rgba(139, 92, 246, 0.28);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 30px rgba(139, 92, 246, 0.16);
    }

    .output-box.loss {
      border-color: rgba(255, 93, 115, 0.30);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 26px rgba(255, 93, 115, 0.14);
    }

    .output-box.fade {
      opacity: 0.55;
      transform: scale(0.994);
    }

    .output {
      margin: 0;
      white-space: pre-line;
      font-size: clamp(22px, 2.8vw, 34px);
      line-height: 1.42;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-shadow: 0 0 16px rgba(139, 92, 246, 0.12);
      max-width: 720px;
      word-break: break-word;
    }

    .output.awaiting {
      color: var(--muted);
      font-weight: 600;
      text-shadow: none;
    }

    .cursor {
      display: inline-block;
      width: 0.65ch;
      text-align: left;
      animation: blink 0.75s step-end infinite;
      color: rgba(255,255,255,0.9);
    }

    .controls {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .btn {
      appearance: none;
      border: 0;
      outline: 0;
      cursor: pointer;
      padding: 14px 24px;
      min-width: 210px;
      border-radius: 999px;
      color: white;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 13px;
      background:
        linear-gradient(90deg, rgba(139, 92, 246, 0.95), rgba(168, 85, 247, 0.95));
      box-shadow:
        0 0 24px rgba(139, 92, 246, 0.28),
        inset 0 0 0 1px rgba(255,255,255,0.1);
      transition: transform var(--transition), box-shadow var(--transition), filter var(--transition), opacity var(--transition);
    }

    .btn:hover {
      transform: translateY(-1px) scale(1.01);
      box-shadow:
        0 0 34px rgba(139, 92, 246, 0.38),
        inset 0 0 0 1px rgba(255,255,255,0.12);
      filter: brightness(1.04);
    }

    .btn:active {
      transform: translateY(0) scale(0.995);
    }

    .btn:disabled {
      opacity: 0.68;
      cursor: not-allowed;
    }

    .copy-btn {
      background:
        linear-gradient(90deg, rgba(34, 211, 238, 0.90), rgba(139, 92, 246, 0.90));
      min-width: 170px;
      box-shadow:
        0 0 20px rgba(34, 211, 238, 0.22),
        inset 0 0 0 1px rgba(255,255,255,0.1);
    }

    .copy-btn.copied {
      filter: brightness(1.08);
      box-shadow:
        0 0 28px rgba(34, 211, 238, 0.30),
        inset 0 0 0 1px rgba(255,255,255,0.12);
    }

    .copy-hint {
      position: relative;
      z-index: 1;
      margin-top: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.03em;
      min-height: 18px;
    }

    .shake {
      animation: shake 0.32s ease;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @keyframes pulseDot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.25); opacity: 0.7; }
    }

    @keyframes wolfPulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.96;
      }
    }

    @keyframes wolfGlow {
      0%, 100% {
        transform: scale(1);
        opacity: 0.72;
      }
      50% {
        transform: scale(1.10);
        opacity: 1;
      }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(2px); }
      100% { transform: translateX(0); }
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 10px;
      }

      .card {
        padding: 16px 14px 16px;
      }

      .wolf-top {
        min-height: 84px;
        margin-bottom: 6px;
      }

      .wolf-glow {
        width: 110px;
        height: 110px;
      }

      .wolf {
        width: 76px;
        max-width: 24vw;
      }

      .output-box {
        min-height: 150px;
        padding: 18px 14px;
      }

      .btn, .copy-btn {
        width: 100%;
        min-width: 0;
      }

      .sub {
        font-size: 13px;
      }
    }
  </style>
</head>

    const output = document.getElementById("output");
    const outputBox = document.getElementById("outputBox");
    const generateBtn = document.getElementById("generateBtn");
    const copyBtn = document.getElementById("copyBtn");
    const copyHint = document.getElementById("copyHint");

    let isTyping = false;
    let currentPlainText = "Awaiting ASTY transmission…";

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function randomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    async function typeText(text, speed = 32) {
      isTyping = true;
      output.classList.remove("awaiting");
      output.textContent = "";

      for (let i = 0; i <= text.length; i++) {
        const visible = text.slice(0, i);
        output.innerHTML = `${escapeHtml(visible)}<span class="cursor">|</span>`;
        await sleep(speed);
      }

      output.innerHTML = `${escapeHtml(text)}<span class="cursor">|</span>`;
      isTyping = false;
    }

    async function generateTransmission() {
      if (isTyping) return;

      generateBtn.disabled = true;
      copyHint.textContent = "";

      outputBox.classList.add("fade");
      outputBox.classList.remove("win", "loss", "shake");

      await sleep(220);

      output.classList.remove("awaiting");
      output.textContent = "Receiving transmission...";

      outputBox.classList.remove("fade");

      await sleep(420);

      const isWin = Math.random() < 0.5;
      const message = isWin ? randomItem(winMessages) : randomItem(lossMessages);
      currentPlainText = message;

      outputBox.classList.remove("win", "loss");
      outputBox.classList.add(isWin ? "win" : "loss");

      if (!isWin) {
        outputBox.classList.add("shake");
        setTimeout(() => outputBox.classList.remove("shake"), 340);
      }

      await typeText(message, isWin ? 34 : 26);

      generateBtn.disabled = false;
    }

    async function copyCurrentText() {
      if (isTyping) return;

      try {
        await navigator.clipboard.writeText(currentPlainText);
        copyBtn.classList.add("copied");
        copyHint.textContent = "Copied to clipboard.";
        setTimeout(() => {
          copyBtn.classList.remove("copied");
        }, 900);
      } catch (err) {
        copyHint.textContent = "Copy failed. Clipboard access was blocked.";
      }
    }

    generateBtn.addEventListener("click", generateTransmission);
    copyBtn.addEventListener("click", copyCurrentText);
