<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTY Runner</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#05010a;
  font-family:Arial;
}

canvas {
  display:block;
}

.ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-weight:bold;
}

button {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:15px 25px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="ui">
  Score: <span id="score">0</span>
</div>

<button id="startBtn">START</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const scoreEl = document.getElementById("score");
const startBtn = document.getElementById("startBtn");

let gameRunning = false;
let score = 0;
let speed = 6;

const logo = new Image();
logo.src = "assets/logo.png";

// lanes
const lanes = [
  canvas.width * 0.25,
  canvas.width * 0.5,
  canvas.width * 0.75
];

let player = {
  lane: 1,
  y: canvas.height - 120,
  size: 60
};

let coins = [];
let obstacles = [];
let particles = [];

// spawn
function spawnCoin(){
  coins.push({
    lane: Math.floor(Math.random()*3),
    y: -50,
    size: 50,
    rot: 0
  });
}

function spawnObstacle(){
  const types = ["SELL","DUMP","DEAD"];
  obstacles.push({
    lane: Math.floor(Math.random()*3),
    y: -60,
    text: types[Math.floor(Math.random()*types.length)]
  });
}

// movement
window.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowLeft") player.lane--;
  if(e.key==="ArrowRight") player.lane++;
  player.lane = Math.max(0,Math.min(2,player.lane));
});

// mobile
canvas.addEventListener("click",(e)=>{
  if(e.clientX < canvas.width/3) player.lane = 0;
  else if(e.clientX < canvas.width*2/3) player.lane = 1;
  else player.lane = 2;
});

// particles
function addParticles(x,y,color){
  for(let i=0;i<15;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*6,
      vy:(Math.random()-0.5)*6,
      life:30,
      color
    });
  }
}

// loop
function gameLoop(){

  if(!gameRunning) return;

  ctx.fillStyle="#05010a";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // draw player glow
  ctx.shadowBlur = 30;
  ctx.shadowColor = "#9b5cff";

  const px = lanes[player.lane];
  ctx.drawImage(logo, px-30, player.y-30, 60,60);

  ctx.shadowBlur = 0;

  // coins
  coins.forEach((c,i)=>{
    c.y += speed;
    c.rot += 0.1;

    const x = lanes[c.lane];

    ctx.save();
    ctx.translate(x,c.y);
    ctx.rotate(c.rot);

    ctx.shadowBlur = 25;
    ctx.shadowColor = "#c084fc";

    ctx.drawImage(logo,-25,-25,50,50);

    ctx.restore();

    // collision
    if(Math.abs(c.y-player.y)<40 && c.lane===player.lane){
      score+=10;
      scoreEl.textContent=score;
      addParticles(x,c.y,"#c084fc");
      coins.splice(i,1);
    }
  });

  // obstacles
  obstacles.forEach((o,i)=>{
    o.y += speed;

    const x = lanes[o.lane];

    ctx.fillStyle = "#ff4d6d";
    ctx.font = "bold 28px Arial";
    ctx.textAlign = "center";

    ctx.shadowBlur = 20;
    ctx.shadowColor = "#ff4d6d";

    ctx.fillText(o.text,x,o.y);

    ctx.shadowBlur = 0;

    if(Math.abs(o.y-player.y)<40 && o.lane===player.lane){
      gameRunning=false;
      alert("Game Over\nScore: "+score);
    }
  });

  // particles
  particles.forEach((p,i)=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;

    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life/30;
    ctx.fillRect(p.x,p.y,4,4);
    ctx.globalAlpha = 1;

    if(p.life<=0) particles.splice(i,1);
  });

  // spawn logic
  if(Math.random()<0.03) spawnCoin();
  if(Math.random()<0.02) spawnObstacle();

  requestAnimationFrame(gameLoop);
}

startBtn.onclick = ()=>{
  gameRunning=true;
  score=0;
  coins=[];
  obstacles=[];
  startBtn.style.display="none";
  gameLoop();
}
</script>

</body>
</html>
